<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excelia — IA para Excel | Otimize, Corrija e Automatize suas Planilhas</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #FFFFFF; --bg-surface: #F7F7F7; --bg-elevated: #FFFFFF;
            --bg-hdr: #F3F2F1; --bg-col-hdr: #E8E8E8;
            --xg: #1D6F42; --xg-l: #217346; --blue: #1867C0;
            --gold: #B8860B; --gold-l: #D4A017;
            --cell-bdr: #D0D0D0; --row-hover: rgba(24,103,192,.05);
            --green: #1D6F42; --red: #C0392B; --amber: #D97706;
            --t1: #1A1A1A; --t2: #404040; --t3: #767676;
            --b1: #E5E5E5; --b2: #CCCCCC;
            --cta: var(--xg); --cta-h: var(--xg-l);
        }
        [data-theme="dark"] {
            --bg-page: #050709; --bg-surface: #0D1219; --bg-elevated: #131924;
            --bg-hdr: #182030; --bg-col-hdr: #1E2940;
            --xg: #2AB569; --xg-l: #38CC7E;
            --gold: #BFA26A; --gold-l: #D4BC8F;
            --blue: #3B6BE0;
            --cell-bdr: rgba(191,162,106,.08);
            --t1: #E8E2D6; --t2: #8A9AB0; --t3: #4E5D73;
            --cta: var(--gold); --cta-h: var(--gold-l);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg-page); color: var(--t1); font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    </style>
</head>
<body>
    <header style="position: fixed; top: 0; left: 0; right: 0; z-index: 50;">
        <div style="background: var(--bg-hdr); border-bottom: 1px solid var(--b1); height: 36px; display: flex; align-items: center; padding: 0 48px;">
            <a href="/" style="display: flex; align-items: center; gap: 8px; text-decoration: none;">
                <div style="width: 22px; height: 22px; background: var(--cta); border-radius: 3px; display: flex; align-items: center; justify-content: center;">
                    <span style="font-family: 'Fraunces', serif; font-weight: 700; font-size: 13px; color: white;">E</span>
                </div>
                <span style="font-family: 'Fraunces', serif; font-weight: 700; font-size: 14px; color: var(--t1);">Excelia</span>
            </a>
        </div>
    </header>
    <section style="min-height: 100vh; padding-top: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
        <h1 style="font-family: 'Fraunces', serif; font-weight: 600; font-size: 3.6rem; line-height: 1.1; color: var(--t1); margin-bottom: 18px;">
            Excel Inteligente.<br>
            <span style="color: var(--blue);">Resultados reais.</span>
        </h1>
        <p style="font-size: 1.0375rem; color: var(--t2); line-height: 1.68; max-width: 460px; margin-bottom: 28px;">
            IA especializada em planilhas brasileiras. Corrija erros automaticamente, gere dashboards executivos.
        </p>
        <a href="#cta" style="font-weight: 700; font-size: 0.9375rem; background: var(--cta); color: white; padding: 13px 28px; border-radius: 3px; text-decoration: none;">
            Começar Grátis →
        </a>
    </section>
</body>
</html>
