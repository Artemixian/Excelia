<!DOCTYPE html>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {

                        brand: {

                            300: '#86EFAC', 400: '#4ADE80', 500: '#22C55E',

        }

        .gradient-text {
            background: linear-gradient(135deg, #16A34A 0%, #22C55E 100%);
            -webkit-background-clip: text;

        }
